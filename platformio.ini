; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Common properties
[common]
build_flags = -Wvla -Werror

; ---------------------------------------------------------------------------
;  Teensy
; ---------------------------------------------------------------------------

; Base properties
[teensy-base]
platform = teensy
framework = arduino
monitor_speed = 115200
build_unflags = -fpermissive -Wno-error=narrowing
build_flags = ${common.build_flags}
extra_scripts = post:scripts/extra_script.py

; Test base properties
[teensy-test-base]
extends = teensy-base
build_type = test
build_flags = ${teensy-base.build_flags}
    -DBOOST_MATH_DISABLE_THREADS
    -I${PROJECT_TEST_DIR}
test_build_src = yes
lib_deps =
    https://github.com/boostorg/math.git#boost-1.91.0

[env:teensy41]
extends = teensy-base
board = teensy41

[env:teensy41-test]
extends = teensy-test-base
board = teensy41
